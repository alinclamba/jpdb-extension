<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; width: 320px; padding: 12px; background: #fff; }
    input {
      width: 100%; padding: 8px 10px; font-size: 13px;
      border: 1px solid #ccc; border-radius: 6px; outline: none;
    }
    input:focus { border-color: #0070f3; }
    #status { margin-top: 10px; font-size: 13px; color: #555; min-height: 20px; }
    #snippet-btn {
      display: none; width: 100%; margin-top: 8px; padding: 8px 10px;
      font-size: 13px; text-align: left; background: #f4f4f4;
      border: 1px solid #ddd; border-radius: 6px; cursor: pointer;
      word-break: break-all;
    }
    #snippet-btn:hover { background: #e8e8e8; }
    #snippet-btn.copied { background: #d4edda; border-color: #a3d9a5; color: #155724; }
    #error { margin-top: 8px; font-size: 12px; color: #c00; display: none; }
  </style>
</head>
<body>
  <input type="text" id="url-input" placeholder="Paste site URL and press Enter" autofocus>
  <div id="status"></div>
  <button id="snippet-btn"></button>
  <div id="error"></div>
  <script src="popup.js"></script>
</body>
</html>
